name: Build and Push to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Public base URL (wird in Client-Bundle eingebaut)'
        required: true
        default: 'https://pension.it-villach.at'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Default-URL (kann via workflow_dispatch ueberschrieben werden)
  DEFAULT_BASE_URL: https://pension.it-villach.at

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build arguments
        id: vars
        run: |
          BASE_URL="${{ github.event.inputs.base_url || env.DEFAULT_BASE_URL }}"
          echo "base_url=${BASE_URL}" >> $GITHUB_OUTPUT
          # RP-ID ist nur der Hostname ohne Protocol
          RP_ID=$(echo "${BASE_URL}" | sed -E 's#^https?://##' | cut -d/ -f1)
          echo "rp_id=${RP_ID}" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ steps.vars.outputs.base_url }}
            NEXT_PUBLIC_PASSKEY_RP_ID=${{ steps.vars.outputs.rp_id }}
            NEXT_PUBLIC_PASSKEY_ORIGIN=${{ steps.vars.outputs.base_url }}

      - name: Image summary
        run: |
          echo "### Image gebaut" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "BASE_URL: ${{ steps.vars.outputs.base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "RP_ID: ${{ steps.vars.outputs.rp_id }}" >> $GITHUB_STEP_SUMMARY
